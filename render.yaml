services:
  - type: web
    name: portfolio-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SEED_ON_BOOT
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: LIBRETRANSLATE_URL
        fromService:
          type: web
          name: libretranslate
          property: hostport
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLOUDINARY_API_URL
        sync: false
      - key: DEFAULT_USER_EMAIL
        sync: false
      - key: DEFAULT_USER_PASSWORD
        sync: false

  - type: web
    name: libretranslate
    runtime: image
    plan: free
    image:
      url: docker.io/libretranslate/libretranslate:latest
    healthCheckPath: /languages
    envVars:
      - key: PORT
        value: "10000"
      - key: LT_PORT
        value: "10000"
      - key: LT_LOAD_ONLY
        value: ar,en,id,zh,ja,ru
      - key: LT_DISABLE_WEB_UI
        value: "true"

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio_db
    ipAllowList: []