services:
  - type: web
    name: portfolio-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SEED_ON_BOOT
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLOUDINARY_API_URL
        sync: false
      - key: DEFAULT_USER_USERNAME
        sync: false
      - key: DEFAULT_USER_PASSPHRASE
        sync: false

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio_db
    ipAllowList: []
